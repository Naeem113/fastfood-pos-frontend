<div class="p-6 h-full overflow-hidden flex flex-col">
  <!-- HEADER -->
  <app-content-header
    [title]="'All Discounts'"
    [description]="'Manage discounts and assign them to products.'"
    [showButton]="true"
    [buttonText]="'Create Discount'"
    [buttonIcon]="'plus'"
    (buttonClick)="addDiscount()"
  >
  </app-content-header>

  <!-- FILTER + VIEW -->
  <app-grid-list-header>
    <div class="flex gap-3 items-center">
      <div class="flex border border-gray-200 rounded-lg overflow-hidden bg-white">
        <button
          *ngFor="let opt of statusFilterOptions"
          (click)="onStatusFilterChange(opt.value)"
          [class]="
            'px-4 py-2 text-sm ' +
            (currentFilter().status === opt.value
              ? 'bg-gray-100 text-primary'
              : 'text-gray-500 hover:bg-gray-50')
          "
        >
          {{ opt.label }}
        </button>
      </div>
      <div *ngIf="selectedDiscounts.length && viewMode() === 'list'" class="flex gap-3">
        <button
          class="px-4 py-1.5 bg-red-100 text-red-600 rounded-lg"
          (click)="deleteSelectedDiscounts()"
        >
          Delete ({{ selectedDiscounts.length }})
        </button>
      </div>
    </div>

    <!-- <app-grid-toggle-button [(value)]="viewMode" (valueChange)="selectedDiscounts=[]"></app-grid-toggle-button> -->
  </app-grid-list-header>

  <!-- GRID VIEW -->
  <div *ngIf="viewMode() === 'grid'" class="overflow-y-auto">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">



      <!-- EMPTY -->
      <div *ngIf="filteredDiscounts.length === 0" class="col-span-full text-center py-16 text-gray-400">
        No discounts found
      </div>

    </div>
  </div>

  <!-- LIST VIEW -->
  <div *ngIf="viewMode() === 'list'" class="min-h-0 no-scrollbar">
    <p-table
    [value]="filteredDiscounts"
      [(selection)]="selectedDiscounts"
      dataKey="code"
      [scrollable]="true"
      scrollHeight="flex"
      styleClass="custom-style-table"
      class="h-full">

      <ng-template #header>
        <tr>
          <th style="width: 5%">
            <p-tableHeaderCheckbox />
          </th>
          <th>Code</th>
          <th>Name</th>
          <th>Branch</th>
          <th>Discount</th>
          <th>Status</th>
          <th></th>
        </tr>
      </ng-template>

      <ng-template #body let-k>
        <tr>
          <td>
            <p-tableCheckbox [value]="k" />
          </td>
          <td>{{ k.code }}</td>
          <td>{{ k.name }}</td>
          <td>{{ k.branch }}</td>

          <td>
              {{ k.type === 'percentage' ? 'Percentage' : 'Fixed Amount' }} <br>
              {{ k.value }}
          </td>
            <td>
              <p-tag [severity]="k.isActive?'success':'danger'" [value]="k.isActive?'Active':'Inactive'" />
          </td>

          <td class="text-center">
            <p-button
              icon="pi pi-pencil"
              class="mr-2"
              [rounded]="true"
              [outlined]="true"
              (click)="editDiscount(k)"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              [rounded]="true"
              [outlined]="true"
              (click)="onDelete(k, $event)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
