 <div class="bg-white  h-full">
   <div class="sticky top-0 left-0 right-0 z-50 bg-white flex items-center justify-between px-4 sm:px-6 py-4">
      <!-- Close Button -->
      <button (click)="goToCategories()" class="w-11 h-11 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>


      </button>

      <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Create category</h1>


      <!-- Save Button -->
      <button class="bg-gray-900 text-white text-sm font-semibold px-6 py-3 rounded-full hover:bg-gray-700 transition-colors">
        Save
      </button>
    </div>

    <!-- Main Content -->
    <div class="pt-10 pb-5 px-4 sm:px-7 max-w-2xl mx-auto w-full">

      <!-- Category Name Input -->
      <div class="mb-4">
        <input
          type="text"
          placeholder="Category name"
          class="w-full border border-gray-200 rounded-xl px-4 py-4 text-gray-400 placeholder-gray-400 text-base focus:outline-none focus:ring-2 focus:ring-black bg-white"
        />
      </div>

      <!-- Image Upload Area -->
      <div class="mb-6">
        <div class="w-full border border-dashed border-gray-300 rounded-xl px-6 py-7 flex items-center justify-center gap-3 cursor-pointer hover:bg-gray-50 transition-colors">
          <!-- Image Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21"/>
          </svg>
          <p class="text-sm text-gray-600 text-center">
            Drag an image here,
            <span class="underline cursor-pointer hover:text-gray-900 transition-colors">upload</span>
            or
            <span class="underline cursor-pointer hover:text-gray-900 transition-colors">browse image library</span>.
          </p>
        </div>
      </div>

      <!-- Parent Category Row -->
      <div class="flex items-center gap-4 py-4">
        <!-- Hierarchy Icon -->
        <div class="flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="5" r="2" fill="currentColor"/>
            <circle cx="5" cy="19" r="2" fill="currentColor"/>
            <circle cx="19" cy="19" r="2" fill="currentColor"/>
            <path stroke-linecap="round" d="M12 7v4M12 11l-7 6M12 11l7 6"/>
          </svg>
        </div>

        <!-- Text -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-gray-900">Parent category</p>
          <p class="text-sm text-gray-500 mt-0.5">Select a parent category to make this a subcategory.</p>
        </div>

        <!-- Select Link -->
        <button class="text-sm font-semibold text-gray-900 underline underline-offset-2 hover:text-gray-600 transition-colors flex-shrink-0">
          Select
        </button>
      </div>

      <!-- Divider -->
      <div class="h-2 bg-gray-200 my-2"></div>

      <!-- Items Section -->
      <div class="mt-6">
        <h2 class="text-xl sm:text-xl font-bold text-gray-900 mb-4">Items</h2>

        <!-- Items Row -->
        <div class="flex items-center gap-4 py-4">
          <!-- Tag Icon -->
          <div class="flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>

          <!-- Text -->
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-900">Items</p>
            <p class="text-sm text-gray-500 mt-0.5">None selected</p>
          </div>

          <!-- Add Link -->
          <button class="text-sm font-semibold text-gray-900 underline underline-offset-2 hover:text-gray-600 transition-colors flex-shrink-0">
            Add
          </button>
        </div>
      </div>







    </div>


    <div class="w-full pb-12 max-w-2xl mx-auto px-5 ">

      <!-- Top Divider -->
      <div class="h-2 bg-gray-200 w-full mb-7"></div>

      <!-- Section Heading -->
      <h2 class="text-[19px] sm:text-xl font-bold text-gray-950 mb-5 tracking-tight">Sales channels and hours</h2>

      <!-- Points of Sale Row -->
      <div class="flex items-center gap-4">

        <!-- POS Icon -->
        <div class="shrink-0">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Receipt / register icon -->
            <rect x="5" y="4" width="14" height="18" rx="1.5" stroke="#111" stroke-width="1.7"/>
            <rect x="8" y="8" width="8" height="5" rx="1" stroke="#111" stroke-width="1.5"/>
            <path d="M8 17h8M8 20h5" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M19 10h2a1 1 0 011 1v10a1 1 0 01-1 1h-2" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- Text Block -->
        <div class="flex-1 min-w-0">
          <p class="text-[15px] font-bold text-gray-950 leading-snug">Points of sale</p>
          <p class="text-[13px] text-gray-500 mt-0.5 leading-snug">Categories appear on Standard mode and Retail mode only.</p>
        </div>

        <!-- Info Icon -->
        <button class="shrink-0 text-gray-400 hover:text-gray-600 transition-colors">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="8.5" stroke="#9ca3af" stroke-width="1.5"/>
            <path d="M10 9v5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="6.5" r="0.75" fill="#9ca3af"/>
          </svg>
        </button>

        <!-- Toggle -->
       <label class="relative inline-flex cursor-pointer items-center">
    <!-- Hidden Checkbox -->
    <input type="checkbox" class="peer sr-only" />

    <!-- The Background Track -->
    <div class="h-6 w-12 rounded-full bg-black duration-300 peer-checked:bg-gray-400"></div>

    <!-- The Sliding Circle -->
    <div class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-all duration-300 peer-checked:translate-x-6"></div>
  </label>


      </div>

      <!-- Bottom Divider -->
      <div class="h-px bg-gray-200 w-full mt-7"></div>

    </div>
 </div>
