<div class="bg-white h-full">
  <div
    class="sticky top-0 left-0 right-0 z-50 bg-white flex items-center justify-between px-4 sm:px-10 py-10"
  >
    <!-- Close Button -->
    <button
      (click)="goToTables()"
      class="w-11 h-11 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-200 transition-colors"
    >
      <i class="pi pi-times text-gray-700"></i>
    </button>

    <h1 class="text-2xl sm:text-3xl font-bold text-primary">Add Table</h1>

    <!-- Save Button -->
    <button
      (click)="saveTable()"
      class="bg-primary text-white text-sm font-semibold px-6 py-3 rounded-full hover:bg-primary-hover transition-colors"
    >
      Save
    </button>
  </div>

  <!-- Main Content -->
  <div class="pt-10 pb-5 px-4 max-w-2xl mx-auto w-full">
    <!-- Table Name Input -->
     <div class="flex flex-col gap-3">
       <app-floating-input
         label="Name"
         placeholder="e.g, Table"
         [required]="true"
         [field]="tableForm.name"
         [submitted]="formSubmitted">
       </app-floating-input>

       <app-floating-input
         label="Table Number"
         [required]="true"
         [field]="tableForm.tableNumber"
         [submitted]="formSubmitted">
       </app-floating-input>

        <app-floating-input
         label="Section / Floor"
         placeholder="e.g, Hall, Ground, VIP"
         [field]="tableForm.section"
         [submitted]="formSubmitted">
       </app-floating-input>

     </div>

    <!-- Seats Row -->
    <div class="flex items-center gap-4 py-4">
      <!-- Hierarchy Icon -->
      <div class="flex-shrink-0">
        <i class="pi pi-table w-6 h-6 text-gray-700"></i>
      </div>

      <!-- Text -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-primary">Seats / Capacity</p>
        <p class="text-sm text-gray-500 mt-0.5">
          Select the number of seats for this table.
        </p>
      </div>

    </div>
    <!-- <div class="h-px bg-gray-200 w-full my-4"></div> -->
    <div class="grid grid-cols-3 sm:grid-cols-5 gap-4 border border-gray-200 p-4 rounded-2xl">
      @for (item of seatCapacityList; track $index) {
        <div
          (click)="tableForm.capacity().value.set(item)"
          [ngClass]="{
            'bg-black text-white border-black': tableForm.capacity().value() === item,
            'bg-white text-gray-800 hover:bg-gray-100': tableForm.capacity().value() !== item
          }"
          class="h-20 flex items-center justify-center rounded-xl border cursor-pointer transition-base font-medium text-lg shadow-sm active:scale-95"
        >
          {{ item }}
        </div>
      }
    </div>
    <div class="h-0.5 bg-gray-200 w-full my-4 mt-8"></div>
    <!-- Section Heading -->
    <h2 class="text-[19px] sm:text-xl font-bold text-gray-950 mb-5 mt-6 tracking-tight">
      Sales branches and channels
    </h2>
    <div class="flex items-center gap-4 py-4">
      <!-- Hierarchy Icon -->
      <div class="flex-shrink-0">
        <i class="pi pi-warehouse w-6 ml-1"></i>
      </div>

      <!-- Text -->
      <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold text-primary">Branches <span class="px-2 text-xs rounded-full bg-yellow-300/70 text-yellow-800">0 of 1</span> </div>
        <p class="text-sm text-gray-500 mt-0.5">
          Hidden at all Branches
        </p>
      </div>

      <!-- Select Link -->
      <button
        (click)="openBranchesModal()"
        class="text-sm font-semibold text-primary underline underline-offset-2 hover:text-gray-600 transition-colors flex-shrink-0"
      >
        Edit
      </button>
    </div>
    <div class="h-px bg-gray-200 w-full my-8 mt-4"></div>

    <!-- Points of Sale Row -->
    <div class="flex items-center gap-4 pb-10">
      <!-- POS Icon -->
      <div class="shrink-0">
        <svg
          width="28"
          height="28"
          viewBox="0 0 28 28"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Receipt / register icon -->
          <rect x="5" y="4" width="14" height="18" rx="1.5" stroke="#111" stroke-width="1.7" />
          <rect x="8" y="8" width="8" height="5" rx="1" stroke="#111" stroke-width="1.5" />
          <path d="M8 17h8M8 20h5" stroke="#111" stroke-width="1.5" stroke-linecap="round" />
          <path
            d="M19 10h2a1 1 0 011 1v10a1 1 0 01-1 1h-2"
            stroke="#111"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <!-- Text Block -->
      <div class="flex-1 min-w-0">
        <p class="text-[15px] font-bold text-gray-950 leading-snug">Points of sale</p>
        <p class="text-[13px] text-gray-500 mt-0.5 leading-snug">
          Categories appear on Standard mode and Retail mode only.
        </p>
      </div>

      <!-- Info Icon -->
      <button class="shrink-0 text-gray-400 hover:text-gray-600 transition-colors">
        <svg
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="10" cy="10" r="8.5" stroke="#9ca3af" stroke-width="1.5" />
          <path d="M10 9v5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" />
          <circle cx="10" cy="6.5" r="0.75" fill="#9ca3af" />
        </svg>
      </button>

      <!-- Toggle -->
      <label class="relative inline-flex cursor-pointer items-center">
        <!-- Hidden Checkbox -->
        <input type="checkbox" class="peer sr-only" checked />

        <!-- The Background Track -->
        <div class="h-6 w-12 rounded-full bg-gray-400 duration-300 peer-checked:bg-black"></div>

        <!-- The Sliding Circle -->
        <div
          class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-all duration-300 peer-checked:translate-x-6"
        ></div>
      </label>
    </div>
  </div>
</div>
