    <script>
        const searchToggle = document.getElementById('searchToggle');
        const searchPopup = document.getElementById('searchPopup');
        const searchClose = document.getElementById('searchClose');
        const cloudToggle = document.getElementById('cloudToggle');
        const cloudPopup = document.getElementById('cloudPopup');
        const cloudClose = document.getElementById('cloudClose');
        const notificationToggle = document.getElementById('notificationToggle');
        const notificationPopup = document.getElementById('notificationPopup');
        const notificationClose = document.getElementById('notificationClose');

        const hideSearch = () => searchPopup.classList.add('hidden');
        const hideCloud = () => cloudPopup.classList.add('hidden');
        const hideNotification = () => notificationPopup.classList.add('hidden');
        const toggleSearch = () => {
            hideCloud();
            hideNotification();
            searchPopup.classList.toggle('hidden');
        };
        const toggleCloud = () => {
            hideSearch();
            hideNotification();
            cloudPopup.classList.toggle('hidden');
        };
        const toggleNotification = () => {
            hideSearch();
            hideCloud();
            notificationPopup.classList.toggle('hidden');
        };

        searchToggle.addEventListener('click', (event) => {
            event.stopPropagation();
            toggleSearch();
        });

        searchClose.addEventListener('click', (event) => {
            event.stopPropagation();
            hideSearch();
        });

        cloudToggle.addEventListener('click', (event) => {
            event.stopPropagation();
            toggleCloud();
        });

        cloudClose.addEventListener('click', (event) => {
            event.stopPropagation();
            hideCloud();
        });

        notificationToggle.addEventListener('click', (event) => {
            event.stopPropagation();
            toggleNotification();
        });

        notificationClose.addEventListener('click', (event) => {
            event.stopPropagation();
            hideNotification();
        });

        document.addEventListener('click', (event) => {
            if (!searchPopup.contains(event.target) && !searchToggle.contains(event.target)) {
                hideSearch();
            }
            if (!cloudPopup.contains(event.target) && !cloudToggle.contains(event.target)) {
                hideCloud();
            }
            if (!notificationPopup.contains(event.target) && !notificationToggle.contains(event.target)) {
                hideNotification();
            }
        });

        searchPopup.addEventListener('click', (event) => {
            event.stopPropagation();
        });

        cloudPopup.addEventListener('click', (event) => {
            event.stopPropagation();
        });

        notificationPopup.addEventListener('click', (event) => {
            event.stopPropagation();
        });
    </script>
