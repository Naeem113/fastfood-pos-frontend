

<div class="flex h-screen">
  <!-- Sidebar -->
  <app-sidebar
  class="bg-primary text-white transition-base overflow-hidden"
  [ngClass]="isSidebarOpen() ? 'w-[14rem]' : 'w-0'"
  ></app-sidebar>
  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col">
    <!-- Header -->
    <app-topBar class="w-full h-[65px]" (toggleSidebar)="toggleSidebar($event)"></app-topBar>

    <div class="flex flex-col flex-1">
       <!-- Main Content -->
       <div class="bg-[#f5f5f7] overflow-hidden h-[calc(100vh-65px)]" [@fadeAnimation]="router.url">
         <router-outlet></router-outlet>
       </div>

       <!-- Footer -->
       <!-- <div class="bg-white dark:bg-primay border-t p-2 text-center">
         <p>Footer content goes here</p>
       </div> -->

     </div>
  </div>
</div>
