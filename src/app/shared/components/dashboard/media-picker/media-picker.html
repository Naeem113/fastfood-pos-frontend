<div class="w-full">

  <!-- Upload Box -->
  <label
    class="w-full border border-dashed border-gray-300 rounded-xl px-6 py-7 flex flex-col gap-3 cursor-pointer hover:bg-gray-50 transition-colors"
  >

    <input
      type="file"
      accept="image/*"
      hidden
      (change)="onFileSelected($event)"
    />

    <div class="flex justify-center items-center gap-3">
      <i class="pi pi-cloud-upload text-gray-700"></i>
      <p class="text-sm text-gray-600 text-center">
        Click to
        <span class="underline cursor-pointer hover:text-gray-900">upload</span> the media
      </p>
    </div>

  </label>

  <!-- Preview -->
  @if (preview()) {
    <div class="relative w-40 mt-4 ">

      <img
        [src]="preview()"
        class="w-40 h-40 object-cover rounded-xl border shadow"
      />

      <!-- Remove Button -->
      <button
        type="button"
        (click)="removeImage()"
        class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center shadow hover:bg-red-600"
      >
        <i class="pi pi-times text-xs"></i>
      </button>

    </div>
  }

</div>
