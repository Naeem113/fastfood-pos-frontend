<app-modal [submittedData]="selectedCategory()">
  <!-- ── Search ── -->
  <div class="py-4">
    <div class="relative">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
           xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input
        type="text"
        placeholder="Search categories"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        class="w-full pl-10 pr-4 py-2.5 rounded-full border border-gray-200
               text-sm text-gray-800 placeholder-gray-400 bg-gray-50
               focus:outline-none focus:border-gray-900 focus:bg-white
               transition-all duration-150"
      />
    </div>
  </div>

  <!-- ── Category List ── -->
  <div
  class=" flex flex-col overflow-auto transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)]"
  [ngClass]="filteredCategories().length > 6 ? 'max-h-72' : 'max-h-96'"
>
    @for (cat of filteredCategories(); track $index) {

<button
  (click)="select(cat)"
  class="flex items-center gap-3 px-3 py-3.5 rounded-2xl
         hover:bg-gray-50 active:bg-gray-100
         text-left w-full
         transition-all duration-200 ease-out
         animate-fadeSlide"
>
      <!-- Icon Box -->
     <div
          class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0"
        >
          <svg
            class="w-5 h-5 text-gray-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <rect x="3" y="3" width="18" height="18" rx="3" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21" />
          </svg>
        </div>

      <!-- Name -->
      <span class="flex-1 text-sm font-medium text-gray-900">{{ cat.name }}</span>

     <div
          class="w-6 h-6 flex items-center justify-center flex-shrink-0 transition-all duration-150"
        >
          @if (config.data?.multiSelect) {
            <!-- ✅ Checkbox -->
            <div
              class="w-6 h-6 p-1 rounded-md border-2 flex items-center justify-center"
              [ngClass]="isSelected(cat) ? 'bg-gray-900 border-gray-900' : 'border-gray-300'"
            >
              @if (isSelected(cat)) {
                <i class="pi pi-check text-white text-xs"></i>
              }
            </div>
          } @else {
            <!-- ✅ Radio -->
            <div
              class="w-6 h-6 rounded-full border-2 flex items-center justify-center"
              [ngClass]="
                isSelected(cat) ? 'border-gray-900 bg-gray-900' : 'border-gray-300 bg-white'
              "
            >
              @if (isSelected(cat)) {
                <div class="w-2 h-2 rounded-full bg-white"></div>
              }
            </div>
          }
        </div>
    </button>
  }

  @if (filteredCategories().length === 0){
    <!-- Empty state -->
    <p
       class="text-center text-sm text-gray-400 py-6">
      No categories found
    </p>
  }
  </div>
</app-modal>
