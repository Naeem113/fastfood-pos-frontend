<nav class="p-3 h-full flex flex-col justify-between overflow-y-auto scrollbar-hide">
  <div>
    <div class="text-[12px] text-[#aeaeb2] mb-4 mt-3 uppercase">Main Navigation</div>
    <ul class="">
    @for (item of sidebarService.menu(); track $index) {
      <li>
        <a
          class="flex items-center gap-3 px-4  font-medium uppercase tracking-wider text-xs  transition-all min-h-[35px] bg-primary-white text-[#aeaeb2]"
          [ngClass]="item.active?'text-[#f59e0b]':'hover:text-white'"
          title="Dashboard"
          [routerLink]="item.link">
          <i class="pi pi-{{item.icon}}"></i>
          <span class="">{{item.title}}</span></a
        >
      </li>
    }
    </ul>
  </div>
  <div class="w-full border border-gray-700 rounded-lg p-2 mb-6 cursor-pointer hover:bg-gray-500/20 transition-all flex items-center gap-3">
    <div class="h-12 w-12 bg-blue-500 rounded-lg flex justify-center items-center">
      {{profileName}}
    </div>
    <div class="flex flex-col">
      <span class="font-semibold text-sm">{{user?.firstName + ' ' + user?.lastName}}</span>
      <span class="text-xs text-[#aeaeb2]">{{user?.role}}</span>
    </div>
  </div>
</nav>
