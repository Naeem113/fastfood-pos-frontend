  <div class="flex items-center justify-between " [ngClass]="{'pt-5': !config.showHeader}">
    <button
      (click)="closeDialog()"
      aria-label="Close"
      class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center
             text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-base"
    >
      <i class="pi pi-times"></i>
    </button>

    <button
      (click)="save()"
      class="bg-gray-900 text-white text-sm font-semibold
             px-6 py-2.5 rounded-full
             hover:bg-gray-700 active:scale-95 transition-base"
    >
      {{config.data?.confirmButtonText || 'Done'}}
    </button>
  </div>


  <!-- ── Title ── -->
  <div class="p-4">
    @if(config.data?.title){
    <h2 class="text-xl font-bold text-gray-900 tracking-tight">
        {{config.data.title}}
      </h2>
    }
    @if(config.data?.description){
      <p class="text-sm text-gray-500 mt-1 leading-snug">
        {{config.data?.description || 'Select a parent category to nest this category underneath it.'}}
      </p>
    }
  </div>

    <!-- Content -->
  <ng-content></ng-content>
