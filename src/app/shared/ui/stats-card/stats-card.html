<div class="bg-white rounded-2xl shadow-sm p-5 flex items-center justify-between">
  <div>
    <p class="text-sm font-medium text-primary">{{ title() }}</p>

    <h2 class="text-2xl font-bold text-primary mt-1">
      {{ value() }}
    </h2>
    @if(description() !== null) {
      <p class="text-xs text-gray-500">
        {{ description() }}
      </p>
    }

    @if (trend() !== null) {
      <p class="text-sm mt-1" [class]="trendColor()">
        {{ trendLabel() }}
      </p>
    }
  </div>

  <div
    class="w-12 h-12 flex items-center justify-center rounded-xl"
    [class]="colorClasses()"
  >
    <i class="pi pi-{{ icon() }}"></i>
  </div>
</div>
