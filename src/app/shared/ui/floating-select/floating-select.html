<div class="relative w-full font-sans">

  <!-- ───────── Trigger ───────── -->
  <button
    #trigger
    (click)="toggle()"
    class="w-full flex items-center gap-4 px-4 py-2 border outline-none focus:ring-1 focus:ring-black rounded-xl text-left transition-all"
    [ngClass]="isOpen() ? '' : 'border-gray-300'"
    [ngClass]="{
      'border-red-500 focus:ring-red-500 focus:border-red-500': hasError()
    }"
  >
    <!-- Icon -->
     @let icon = getIcon(selectedItem());
     @if(icon){
       <div class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center">
         <ng-container
           [ngTemplateOutlet]="iconTpl"
           [ngTemplateOutletContext]="{ icon }">
         </ng-container>
       </div>
     }

    <!-- Text -->
    <div class="flex-1 min-w-0">
      <p class="text-sm -mt-1 text-primary-hover tracking-wide">
        {{label}}
      </p>
      <p class="text-base truncate" [ngClass]="selectedItem()?'text-black':'text-gray-400'">
        {{ displayLabel() }}
      </p>
    </div>

    <!-- Arrow -->
    <svg class="w-5 h-5 text-gray-500 transition-transform transition-base"
         [class.rotate-180]="!isOpen()"
         viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path stroke-width="2" d="M5 15l7-7 7 7"/>
    </svg>
  </button>

  <!-- ───────── Dropdown ───────── -->
  <div
    *ngIf="isOpen()"
    [@slideY]
    class="absolute left-0 right-0 bg-white border rounded-xl shadow-xl z-50 overflow-y-auto max-h-[300px] no-scrollbar"
    [ngClass]="openUpward() ? 'bottom-full mb-1' : 'top-full mt-1'"
  >
    <button
      *ngFor="let item of items; let i = index"
      (click)="select(item)"
      class="w-full flex items-center gap-4 px-4 py-3 text-left hover:bg-gray-50 transition border-b"
    [ngClass]="{
  'bg-gray-100': multiSelection
    ? selectedItems().includes(item)
    : item === selectedItem(),
  'hover:bg-gray-50': true
}"
      >
    @if (multiSelection) {
      <div class="ml-auto">
        <svg *ngIf="selectedItems().includes(item)"
            class="w-5 h-5 text-green-600"
            viewBox="0 0 24 24" fill="none">
          <path stroke="currentColor" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
    }
      <!-- Icon -->
     @let icon = getIcon(item);
      @if(icon){
        <div class="w-10 h-10 bg-gray-100 rounded flex items-center justify-center">
          <ng-container
            [ngTemplateOutlet]="iconTpl"
            [ngTemplateOutletContext]="{ icon }">
          </ng-container>
        </div>
      }

      <!-- Text -->
      <div class="flex-1">
        <p class="font-semibold text-gray-900">
          {{ getLabel(item) }}
        </p>
        <p class="text-sm text-gray-500">
          {{ getDescription(item) }}
        </p>
      </div>
    </button>
  </div>
</div>
@if (hasError()) {
  <p class="text-xs text-red-500 mt-1">This field is required</p>
}
<!-- ───────── ICON TEMPLATE ───────── -->
<ng-template #iconTpl let-icon="icon">

  <svg *ngIf="icon === 'food'" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none">
    <path stroke="currentColor" stroke-width="2" d="M3 3v18M8 3v18M15 3c0 3 3 7 3 7s3-4 3-7M18 10v11"/>
  </svg>

  <svg *ngIf="icon === 'tag'" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none">
    <path stroke="currentColor" stroke-width="2" d="M3 7l10 10 8-8-10-10H3z"/>
  </svg>

  <svg *ngIf="!icon" class="w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
  </svg>

</ng-template>
