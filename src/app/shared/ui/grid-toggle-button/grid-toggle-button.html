<div class="relative inline-flex items-center bg-gray-100 rounded-xl p-1 border">

  <!-- Sliding indicator -->
  <div
    class="absolute top-1 bottom-1 w-1/2 rounded-lg bg-white shadow transition-all duration-300 ease-out"
    [ngClass]="{
      'left-1': value === 'grid',
      'left-1/2': value === 'list'
    }"
  ></div>

  <!-- Grid -->
  <button
    (click)="setView('grid')"
    class="relative z-10 flex items-center justify-center gap-1 w-16 h-8 rounded-lg text-sm font-medium transition-all"
    [ngClass]="value === 'grid'
      ? 'text-gray-900'
      : 'text-gray-500 hover:text-gray-700'"
  >
    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16">
      <rect x="1" y="1" width="6" height="6" rx="1.2"/>
      <rect x="9" y="1" width="6" height="6" rx="1.2"/>
      <rect x="1" y="9" width="6" height="6" rx="1.2"/>
      <rect x="9" y="9" width="6" height="6" rx="1.2"/>
    </svg>
    <span class="hidden sm:inline">Grid</span>
  </button>

  <!-- List -->
  <button
    (click)="setView('list')"
    class="relative z-10 flex items-center justify-center gap-1 w-16 h-8 rounded-lg text-sm font-medium transition-all"
    [ngClass]="value === 'list'
      ? 'text-gray-900'
      : 'text-gray-500 hover:text-gray-700'"
  >
    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16">
      <rect x="1" y="2" width="14" height="2" rx="1"/>
      <rect x="1" y="7" width="14" height="2" rx="1"/>
      <rect x="1" y="12" width="14" height="2" rx="1"/>
    </svg>
    <span class="hidden sm:inline">List</span>
  </button>

</div>
